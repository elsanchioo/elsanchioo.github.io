<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Biblioteca</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📚 Mi Biblioteca</h1>
  <p>🎬 Videos + 🎧 Música</p>
</header>

<section class="grid">

  <!-- 🎧 SPOTIFY -->
  <div class="card">
    <h2>🎧 Playlist</h2>
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/playlist/TU_ID"
      width="100%" height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <!-- 🎬 VIDEO 1 -->
  <div class="card">
    <h2>🎬 Capítulo 1</h2>
    <video controls>
      <source src="videos/cap1.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 🎬 VIDEO 2 -->
  <div class="card">
    <h2>🎬 Capítulo 2</h2>
    <video controls>
      <source src="videos/cap2.mp4" type="video/mp4">
    </video>
  </div>

</section>

</body>
</html>
