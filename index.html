<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Multimedia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  Multimedia
</header>

<div class="container">

  <!-- 🧭 EXPLORADOR IZQUIERDO -->
  <aside class="explorer">

    <div class="section-title">📁 Archivos</div>

    <div class="item" onclick="openMedia('videos/cap1.mp4','Capítulo 1')">
      🎬 Capítulo 1
    </div>

    <div class="item" onclick="openMedia('videos/cap2.mp4','Capítulo 2')">
      🎬 Capítulo 2
    </div>

    <div class="item" onclick="openMedia('music/song1.mp3','Canción 1')">
      🎧 Canción 1
    </div>

  </aside>

  <!-- 🎬 REPRODUCTOR DERECHO -->
  <main class="viewer">

    <h2 id="title">Selecciona un archivo</h2>

    <video id="player" controls></video>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
