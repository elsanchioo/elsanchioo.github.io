<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📚 TITULO TITULO</h1>
</header>

<div class="container">

  <!-- 📂 LISTA IZQUIERDA -->
  <aside class="sidebar">
    <h3>📁 Videos</h3>

    <button onclick="playVideo('videos/cap1.mp4','Capítulo 1')">▶ Capítulo 1</button>
    <button onclick="playVideo('videos/cap2.mp4','Capítulo 2')">▶ Capítulo 2</button>

    <h3>🎧 Música</h3>
    <iframe
      src="https://open.spotify.com/embed/playlist/TU_ID"
      width="100%" height="152"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media">
    </iframe>
  </aside>

  <!-- 🎬 REPRODUCTOR GRANDE -->
  <main class="player">
    <h2 id="title">Selecciona algo</h2>

    <video id="videoPlayer" controls>
      <source src="" type="video/mp4">
    </video>
  </main>

</div>

<script>
function playVideo(src, title) {
  document.getElementById("videoPlayer").src = src;
  document.getElementById("title").innerText = title;
}
</script>

</body>
</html>
