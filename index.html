<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>File Library</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  📁 Mi Administrador de Archivos Multimedia
</header>

<div class="layout">

  <!-- 🧭 PANEL IZQUIERDO (CARPETAS) -->
  <aside class="folders">
    <h3>📂 Carpetas</h3>

    <button onclick="loadFolder('videos')">🎬 Videos</button>
    <button onclick="loadFolder('musica')">🎧 Música</button>
  </aside>

  <!-- 📄 LISTA CENTRAL -->
  <section class="files">
    <h3>📄 Archivos</h3>
    <div id="fileList"></div>
  </section>

  <!-- 🎬 PREVIEW DERECHO -->
  <section class="preview">
    <h3 id="title">Nada seleccionado</h3>

    <video id="player" controls></video>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
